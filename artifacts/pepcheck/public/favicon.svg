<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="white"/>
  <!-- Pill capsule rotated 45deg: solid top-right half, outline bottom-left half -->
  <!-- Outer capsule outline -->
  <rect x="6" y="10" width="20" height="12" rx="6" transform="rotate(45 16 16)" fill="#0d9488" opacity="0.18"/>
  <rect x="6" y="10" width="20" height="12" rx="6" transform="rotate(45 16 16)" stroke="#0d9488" stroke-width="2" fill="none"/>
  <!-- Dividing line across middle -->
  <line x1="8" y1="24" x2="24" y2="8" stroke="#0d9488" stroke-width="2" stroke-linecap="round"/>
  <!-- Solid top-right half fill -->
  <clipPath id="top">
    <polygon points="16,0 32,0 32,16"/>
  </clipPath>
  <rect x="6" y="10" width="20" height="12" rx="6" transform="rotate(45 16 16)" fill="#0d9488" clip-path="url(#top)"/>
</svg>
